<title>CS Shortcut Library</title>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5ede0;color:#3a2a1a;min-height:100vh}
.app{max-width:900px;margin:0 auto;padding:1.5rem 1rem 4rem}
header{margin-bottom:1.25rem}
h1{font-size:22px;font-weight:600;color:#5c3d1e;margin-bottom:3px}
.subtitle{font-size:13px;color:#8a6a4a}
.search-wrap{position:relative;margin-bottom:1rem}

.search-wrap input:focus{border-color:#a0714a;background:#fff}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#a0714a;font-size:15px;pointer-events:none}
.tabs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:1rem}
.tab{padding:5px 11px;border-radius:20px;border:1.5px solid #d4b896;background:#fff8f0;font-size:12px;color:#7a5232;cursor:pointer;transition:all .15s;font-family:inherit}
.tab:hover{background:#eedcc6;border-color:#b8895a}
.tab.active{background:#7a5232;color:#fff;border-color:#7a5232}
.stats{font-size:12px;color:#8a6a4a;margin-bottom:1rem}
.section{margin-bottom:1rem;border-radius:10px;background:#fffdf8;border:1.5px solid #e0ccb4;overflow:hidden}
.section-header{padding:11px 14px;background:#f0e4d0;cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none;border-bottom:1.5px solid #e0ccb4}
.section-header:hover{background:#e8d8c0}
.section-num{font-size:10px;background:#c8a07a;color:#fff;border-radius:9px;padding:2px 7px;font-weight:600;letter-spacing:.03em}
.section-header h2{font-size:14px;font-weight:600;color:#5c3d1e;flex:1}
.section-match{font-size:11px;color:#8a6a4a;margin-right:4px}
.chevron{color:#8a6a4a;font-size:12px;transition:transform .2s;display:inline-block}
.section.collapsed .chevron{transform:rotate(-90deg)}
.section-body{padding:10px}
.section.collapsed .section-body{display:none}
.subsection-title{font-size:11px;font-weight:600;color:#8a6a4a;text-transform:uppercase;letter-spacing:.07em;margin:10px 0 5px 2px}
.subsection-title:first-child{margin-top:2px}
.spiel{background:#fff8f0;border:1.5px solid #e8d5bc;border-radius:7px;padding:9px 11px;margin-bottom:6px;display:flex;align-items:flex-start;gap:9px}
.spiel:last-child{margin-bottom:0}
.spiel-text{font-size:13.5px;color:#3a2a1a;line-height:1.6;flex:1}
.spiel-text em{font-style:normal;font-weight:600;color:#7a5232;background:#f0e4d0;padding:1px 3px;border-radius:3px}
.copy-btn{flex-shrink:0;padding:5px 10px;border-radius:6px;border:1.5px solid #c8a07a;background:#fff;color:#7a5232;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .15s;white-space:nowrap;font-family:inherit;font-weight:500}
.copy-btn:hover{background:#f0e4d0}
.copy-btn.copied{background:#4a7c30;border-color:#4a7c30;color:#fff}
.no-results{text-align:center;padding:2.5rem;color:#8a6a4a;font-size:14px}
.no-results span{display:block;font-size:28px;margin-bottom:8px}
.header-match{background:#fff3e0;border:1.5px solid #e0ccb4}
.header-match .section-header{background:#ffe8c8}
</style>
</head>

function getAllEntries(s){
  if(s.entries) return s.entries;
  if(s.subsections) return s.subsections.flatMap(ss=>ss.entries);
  return[];
}

function esc(t){
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text,term){
  if(!term) return esc(text);
  const re=new RegExp('('+term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return esc(text).replace(re,'<em>$1</em>');
}

let activeTab='all';

function buildTabs(){
  const c=document.getElementById('tabsContainer');
  const allBtn=document.createElement('button');
  allBtn.className='tab active';allBtn.textContent='All';
  allBtn.onclick=()=>setTab('all',allBtn);
  c.appendChild(allBtn);
  SECTIONS.forEach(s=>{
    const b=document.createElement('button');
    b.className='tab';b.textContent=s.label;b.dataset.id=s.id;
    b.onclick=()=>setTab(s.id,b);
    c.appendChild(b);
  });
}

function setTab(id,btn){
  activeTab=id;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function labelMatchesFilter(section, ft){
  return section.label.toLowerCase().includes(ft) || section.num.includes(ft);
}

function render(){
  const ft=document.getElementById('searchInput').value.trim().toLowerCase();
  const container=document.getElementById('sectionsContainer');
  container.innerHTML='';
  let total=0;
  const list=activeTab==='all'?SECTIONS:SECTIONS.filter(s=>s.id===activeTab);

  list.forEach(section=>{
    const allE=getAllEntries(section);
    const headerMatch=ft && labelMatchesFilter(section,ft);
    const matchedEntries=ft?allE.filter(e=>e.toLowerCase().includes(ft)):allE;

    // Show section if header matches OR any entries match
    if(ft && !headerMatch && !matchedEntries.length) return;

    // If header matches with no entry matches, show all entries
    const entriesToShow=headerMatch && !matchedEntries.length ? allE : matchedEntries;
    total+=entriesToShow.length;

    const div=document.createElement('div');
    div.className='section'+(headerMatch && !matchedEntries.length?' header-match':'');

    // Build header with highlighted label if header matched
    const labelHtml=headerMatch ? highlight(section.label,ft) : esc(section.label);
    div.innerHTML=`<div class="section-header"><span class="section-num">${section.num}</span><h2>${labelHtml}</h2><span class="section-match">${entriesToShow.length}</span><span class="chevron">&#9660;</span></div><div class="section-body"></div>`;
    div.querySelector('.section-header').addEventListener('click',()=>div.classList.toggle('collapsed'));
    const body=div.querySelector('.section-body');

    if(section.entries){
      (headerMatch && !matchedEntries.length ? allE : section.entries.filter(e=>!ft||e.toLowerCase().includes(ft))).forEach(e=>{
        body.appendChild(buildSpiel(e,headerMatch&&!matchedEntries.length?'':ft));
      });
    } else if(section.subsections){
      section.subsections.forEach(ss=>{
        const me=ft&&!headerMatch?ss.entries.filter(e=>e.toLowerCase().includes(ft)):ss.entries;
        if(!me.length) return;
        const st=document.createElement('div');st.className='subsection-title';st.textContent=ss.title;body.appendChild(st);
        me.forEach(e=>body.appendChild(buildSpiel(e,headerMatch&&!matchedEntries.length?'':ft)));
      });
    }

    container.appendChild(div);
  });

  document.getElementById('statsDisplay').textContent=
    total+(total===1?' spiel':' spiels')+(ft?` matching "${ft}"`:'');

  if(!container.children.length){
    container.innerHTML='<div class="no-results"><span>&#128270;</span>No spiels found. Try a different search term.</div>';
  }
}

function buildSpiel(text,ft){
  const d=document.createElement('div');d.className='spiel';
  const safeForAttr=text.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n');
  d.innerHTML=`<p class="spiel-text">${highlight(text,ft)}</p><button class="copy-btn" onclick="copyText(this,'${safeForAttr}')">&#128203; Copy</button>`;
  return d;
}

function copyText(btn,text){
  const decoded=text.replace(/\\n/g,'\n');
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(decoded).then(()=>flashCopied(btn)).catch(()=>fallbackCopy(btn,decoded));
  } else {
    fallbackCopy(btn,decoded);
  }
}

function fallbackCopy(btn,text){
  const ta=document.createElement('textarea');
  ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');}catch(e){}
  document.body.removeChild(ta);
  flashCopied(btn);
}

function flashCopied(btn){
  btn.innerHTML='&#10003; Copied!';btn.classList.add('copied');
  setTimeout(()=>{btn.innerHTML='&#128203; Copy';btn.classList.remove('copied');},1800);
}

buildTabs();
render();
document.getElementById('searchInput').addEventListener('input',render);
</script>
